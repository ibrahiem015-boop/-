<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حصريات - منصة الفيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== شريط التنقل ===== */
        .navbar {
            background: #1a1a1a;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-area {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .user-badge {
            background: #333;
            padding: 8px 15px;
            border-radius: 25px;
            color: #4ecdc4;
            font-size: 14px;
        }

        .dev-badge {
            background: #ff6b6b;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
        }

        .dev-badge:hover {
            transform: scale(1.1);
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            transform: scale(1.1);
        }

        /* ===== الألوان المتحركة ===== */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-header {
            animation: gradient 10s infinite;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #ff6b6b);
            background-size: 200% 200%;
            padding: 15px;
            border-radius: 40px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        /* ===== إحصائيات ===== */
        .stats-bar {
            background: linear-gradient(135deg, #ff6b6b20, #4ecdc420);
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid #4ecdc4;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 40px;
            color: #4ecdc4;
            font-weight: bold;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        /* ===== زر الرفع (للمطور فقط) ===== */
        .upload-section {
            margin: 20px 0;
            display: none;
        }

        .upload-section.visible {
            display: block;
        }

        .upload-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .upload-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(255,107,107,0.3);
        }

        /* ===== رأس الأزرار ===== */
        .buttons-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 20px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 30px;
        }

        .buttons-title {
            color: #4ecdc4;
            font-size: 20px;
            font-weight: bold;
        }

        .total-badge {
            background: #333;
            padding: 8px 20px;
            border-radius: 25px;
            color: #ff6b6b;
            font-size: 14px;
        }

        /* ===== شبكة الأزرار ===== */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin: 20px 0 40px;
        }

        .page-button {
            background: #1a1a1a;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .page-button:hover {
            transform: translateY(-5px);
            border-color: #4ecdc4;
            box-shadow: 0 10px 20px rgba(78, 205, 196, 0.2);
        }

        .button-number {
            font-size: 36px;
            color: #4ecdc4;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .button-range {
            color: #ff6b6b;
            font-size: 13px;
            margin: 5px 0;
        }

        .button-count {
            background: #333;
            padding: 5px;
            border-radius: 15px;
            font-size: 12px;
            color: #888;
        }

        /* ===== صفحة الرفع ===== */
        .upload-page {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }

        .upload-page.active {
            display: block;
        }

        .upload-page h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 150px;
            border: 3px dashed #4ecdc4;
            border-radius: 30px;
            margin: 20px 0;
            cursor: pointer;
            color: #4ecdc4;
            font-size: 60px;
            transition: 0.3s;
            background: #222;
        }

        .file-label:hover {
            background: rgba(78, 205, 196, 0.1);
        }

        #fileInput {
            display: none;
        }

        .counter {
            color: #4ecdc4;
            font-size: 16px;
            margin: 15px 0;
            text-align: center;
        }

        .files-list {
            max-height: 250px;
            overflow-y: auto;
            background: #222;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #333;
            color: white;
            font-size: 13px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item .size {
            color: #888;
        }

        .upload-action-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0;
        }

        .upload-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-btn {
            text-align: center;
            color: #888;
            margin-top: 15px;
            cursor: pointer;
            padding: 10px;
        }

        .back-btn:hover {
            color: #4ecdc4;
        }

        /* ===== مؤشر التحميل ===== */
        .upload-progress {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a1a;
            border: 2px solid #4ecdc4;
            border-radius: 30px;
            padding: 20px;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            color: white;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-details {
            color: #888;
            font-size: 13px;
            text-align: center;
        }

        /* ===== صفحة المقاطع ===== */
        .videos-page {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }

        .videos-page.active {
            display: block;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .page-header h2 {
            color: #4ecdc4;
        }

        .close-page {
            background: #333;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .video-card {
            background: #222;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #333;
        }

        .video-card:hover {
            transform: translateY(-3px);
            border-color: #4ecdc4;
        }

        .video-thumb {
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: relative;
        }

        .video-number {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
        }

        .dev-badge-small {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #ff6b6b;
            color: white;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 9px;
        }

        .video-info {
            padding: 12px;
        }

        .video-name {
            color: white;
            font-size: 13px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .video-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.3s;
        }

        .play-btn {
            background: #4ecdc4;
            color: black;
        }

        .play-btn:hover {
            background: #ff6b6b;
            color: white;
        }

        .download-btn {
            background: #333;
            color: #4ecdc4;
            border: 1px solid #4ecdc4;
        }

        .download-btn:hover {
            background: #4ecdc4;
            color: black;
        }

        .download-btn.dev-only {
            display: none;
        }

        .download-btn.dev-only.visible {
            display: flex;
        }

        /* ===== عناصر المطور فقط ===== */
        .dev-only {
            display: none;
        }

        .dev-only.visible {
            display: block;
        }

        .dev-only-inline {
            display: none;
        }

        .dev-only-inline.visible {
            display: inline-flex;
        }

        /* ===== نافذة الخروج ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 30px;
            max-width: 300px;
            width: 90%;
            text-align: center;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 15px;
        }

        .modal-content p {
            color: #888;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-btn.yes {
            background: #ff4757;
            color: white;
        }

        .modal-btn.no {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <!-- مؤشر التحميل -->
    <div class="upload-progress" id="uploadProgress">
        <div class="progress-header">
            <span>📤 جاري الرفع</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-details" id="progressDetails"></div>
    </div>

    <!-- نافذة الخروج -->
    <div class="modal" id="exitModal">
        <div class="modal-content">
            <h3>⚠️ تأكيد الخروج</h3>
            <p>هل أنت متأكد من الخروج؟</p>
            <div class="modal-buttons">
                <button class="modal-btn yes" id="confirmExit">نعم</button>
                <button class="modal-btn no" id="cancelExit">لا</button>
            </div>
        </div>
    </div>

    <!-- نافذة تسجيل الدخول -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3>🔐 تسجيل الدخول</h3>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" style="width:100%; padding:12px; margin:10px 0; border-radius:25px; border:none; background:#333; color:white;">
            <input type="password" id="loginPassword" placeholder="كلمة المرور" style="width:100%; padding:12px; margin:10px 0; border-radius:25px; border:none; background:#333; color:white;">
            <div class="modal-buttons" style="margin-top:20px;">
                <button class="modal-btn yes" id="loginSubmit">دخول</button>
                <button class="modal-btn no" id="cancelLogin">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- الشريط العلوي المتحرك -->
        <div class="animated-header">
            ✨ حصريات - منصة الفيديو ✨
        </div>

        <!-- شريط التنقل -->
        <div class="navbar">
            <div class="logo">🎬 حصريات</div>
            <div class="user-area">
                <span class="user-badge" id="userName">زائر</span>
                <div class="dev-badge" id="devBadge" style="display: none;">⚙️</div>
                <button class="logout-btn" id="logoutBtn">🚪</button>
            </div>
        </div>

        <!-- إحصائيات -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalVideos">0</div>
                <div class="stat-label">إجمالي المقاطع</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalButtons">0</div>
                <div class="stat-label">عدد الأزرار</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">10</div>
                <div class="stat-label">مقطع/زر</div>
            </div>
        </div>

        <!-- زر الرفع (للمطور فقط) -->
        <div class="upload-section dev-only" id="uploadSection">
            <button class="upload-btn" id="showUploadBtn">
                <span>📦</span> رفع مقاطع جديدة
            </button>
        </div>

        <!-- رأس الأزرار -->
        <div class="buttons-header">
            <span class="buttons-title">📌 الأزرار المتاحة</span>
            <span class="total-badge" id="buttonsCount">0 زر</span>
        </div>

        <!-- شبكة الأزرار -->
        <div class="buttons-grid" id="buttonsGrid"></div>

        <!-- صفحة الرفع -->
        <div class="upload-page" id="uploadPage">
            <h2>📦 رفع مقاطع جديدة</h2>
            <label class="file-label" for="fileInput" id="fileLabel">📁</label>
            <input type="file" id="fileInput" accept="video/*" multiple>
            
            <div class="counter" id="counter">0 مقطع</div>
            <div class="files-list" id="filesList"></div>
            
            <button class="upload-action-btn" id="uploadBtn" disabled>بدء الرفع</button>
            <div class="back-btn" id="backBtn">← العودة للرئيسية</div>
        </div>

        <!-- صفحة عرض المقاطع -->
        <div class="videos-page" id="videosPage">
            <div class="page-header">
                <h2 id="pageTitle"></h2>
                <button class="close-page" id="closeVideosPage">✕</button>
            </div>
            <div class="videos-grid" id="videosGrid"></div>
        </div>
    </div>

    <script>
        // ===== إعدادات =====
        const DEVELOPER_EMAIL = 'admin@hasryat.com';
        const DEVELOPER_PASSWORD = 'Admin@123';
        const VIDEOS_PER_BUTTON = 10;

        // ===== المستخدمين =====
        let users = {
            [DEVELOPER_EMAIL]: {
                email: DEVELOPER_EMAIL,
                name: 'مدير النظام',
                password: DEVELOPER_PASSWORD,
                isDeveloper: true
            }
        };

        // ===== المتغيرات =====
        let currentUser = null;
        let videos = [];
        let selectedFiles = [];

        // ===== تحميل البيانات =====
        function loadData() {
            const saved = localStorage.getItem('hasryat_videos');
            if (saved) {
                try {
                    videos = JSON.parse(saved);
                } catch (e) {
                    videos = [];
                }
            }
            updateButtons();
        }

        function saveData() {
            localStorage.setItem('hasryat_videos', JSON.stringify(videos));
            updateButtons();
        }

        // ===== تحديث واجهة المستخدم =====
        function updateUI() {
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser.name;
                
                if (currentUser.isDeveloper) {
                    document.getElementById('devBadge').style.display = 'flex';
                    document.querySelectorAll('.dev-only').forEach(el => {
                        el.classList.add('visible');
                    });
                    document.querySelectorAll('.dev-only-inline').forEach(el => {
                        el.classList.add('visible');
                    });
                } else {
                    document.getElementById('devBadge').style.display = 'none';
                    document.querySelectorAll('.dev-only').forEach(el => {
                        el.classList.remove('visible');
                    });
                    document.querySelectorAll('.dev-only-inline').forEach(el => {
                        el.classList.remove('visible');
                    });
                }
            } else {
                document.getElementById('userName').textContent = 'زائر';
                document.getElementById('devBadge').style.display = 'none';
                document.querySelectorAll('.dev-only').forEach(el => {
                    el.classList.remove('visible');
                });
                document.querySelectorAll('.dev-only-inline').forEach(el => {
                    el.classList.remove('visible');
                });
            }
        }

        // ===== التحقق من تسجيل الدخول =====
        function checkLogin() {
            const saved = localStorage.getItem('hasryat_current_user');
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    if (users[user.email]) {
                        currentUser = users[user.email];
                        updateUI();
                    }
                } catch (e) {}
            }
        }

        // ===== توليد الأزرار =====
        function updateButtons() {
            const buttonsGrid = document.getElementById('buttonsGrid');
            const totalVideos = videos.length;
            const totalButtons = Math.ceil(totalVideos / VIDEOS_PER_BUTTON);
            
            document.getElementById('totalVideos').textContent = totalVideos;
            document.getElementById('totalButtons').textContent = totalButtons;
            document.getElementById('buttonsCount').textContent = totalButtons + ' زر';
            
            buttonsGrid.innerHTML = '';
            
            if (totalButtons === 0) {
                buttonsGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#888;">📭 لا توجد أزرار بعد</div>';
                return;
            }
            
            for (let i = 1; i <= totalButtons; i++) {
                const start = (i - 1) * VIDEOS_PER_BUTTON + 1;
                const end = Math.min(i * VIDEOS_PER_BUTTON, totalVideos);
                const count = end - start + 1;
                
                const button = document.createElement('div');
                button.className = 'page-button';
                button.onclick = () => showVideosPage(i, start, end);
                
                button.innerHTML = `
                    <div class="button-number">${i}</div>
                    <div class="button-range">${start} - ${end}</div>
                    <div class="button-count">${count} مقطع</div>
                `;
                
                buttonsGrid.appendChild(button);
            }
        }

        // ===== عرض صفحة المقاطع =====
        function showVideosPage(buttonNum, start, end) {
            const pageVideos = videos.slice(start - 1, end);
            const videosGrid = document.getElementById('videosGrid');
            const pageTitle = document.getElementById('pageTitle');
            
            pageTitle.textContent = `📄 الزر ${buttonNum} - مقاطع ${start} إلى ${end}`;
            videosGrid.innerHTML = '';
            
            pageVideos.forEach((video, index) => {
                const videoIndex = start + index;
                const isDevVideo = video.uploadedBy === DEVELOPER_EMAIL;
                
                const videoCard = document.createElement('div');
                videoCard.className = 'video-card';
                
                let actionsHtml = '';
                
                if (currentUser?.isDeveloper) {
                    // للمطور: يشوف زر التشغيل والتحميل
                    actionsHtml = `
                        <button class="action-btn play-btn" onclick="playVideo(${videoIndex - 1})">▶️ تشغيل</button>
                        <button class="action-btn download-btn" onclick="downloadVideo(${videoIndex - 1})">⬇️ تحميل</button>
                    `;
                } else {
                    // للمستخدم العادي: يشوف زر التشغيل فقط (بدون تحميل)
                    actionsHtml = `
                        <button class="action-btn play-btn" onclick="playVideo(${videoIndex - 1})">▶️ تشغيل</button>
                    `;
                }
                
                videoCard.innerHTML = `
                    <div class="video-thumb">
                        🎬
                        <span class="video-number">#${videoIndex}</span>
                        ${isDevVideo ? '<span class="dev-badge-small">مطور</span>' : ''}
                    </div>
                    <div class="video-info">
                        <div class="video-name">${video.name || `مقطع ${videoIndex}`}</div>
                        <div class="video-meta">
                            <span>${video.size ? (video.size/1024/1024).toFixed(2) + ' MB' : '?? MB'}</span>
                            <span>${video.date || '06-03'}</span>
                        </div>
                        <div class="video-actions">
                            ${actionsHtml}
                        </div>
                    </div>
                `;
                
                videosGrid.appendChild(videoCard);
            });
            
            document.querySelector('.buttons-header').style.display = 'none';
            document.getElementById('buttonsGrid').style.display = 'none';
            document.getElementById('videosPage').classList.add('active');
        }

        // ===== تشغيل الفيديو =====
        window.playVideo = function(index) {
            const video = videos[index];
            if (!video) return;
            
            const videoWindow = window.open('', '_blank');
            videoWindow.document.write(`
                <html dir="rtl">
                <head>
                    <title>${video.name || 'مقطع'}</title>
                    <style>
                        body { margin:0; background:#000; display:flex; align-items:center; justify-content:center; height:100vh; }
                        video { max-width:100%; max-height:100%; }
                        .back-btn { position:absolute; top:20px; right:20px; color:white; text-decoration:none; background:#333; padding:10px 20px; border-radius:30px; }
                    </style>
                </head>
                <body>
                    <button class="back-btn" onclick="window.close()">← رجوع</button>
                    <video controls autoplay>
                        <source src="${video.url || '#'}" type="video/mp4">
                    </video>
                </body>
                </html>
            `);
        };

        // ===== تحميل الفيديو (للمطور فقط) =====
        window.downloadVideo = function(index) {
            if (!currentUser?.isDeveloper) {
                alert('❌ التحميل متاح فقط للمطور');
                return;
            }
            
            const video = videos[index];
            if (!video) return;
            
            alert(`جاري تحميل: ${video.name || 'مقطع'}`);
            // هنا كود التحميل الفعلي
        };

        // ===== رفع الملفات =====
        async function uploadFiles(files) {
            const progress = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressPercent = document.getElementById('progressPercent');
            const progressDetails = document.getElementById('progressDetails');
            
            progress.style.display = 'block';
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const percent = Math.round(((i + 1) / files.length) * 100);
                
                progressFill.style.width = percent + '%';
                progressPercent.textContent = percent + '%';
                progressDetails.textContent = `جاري رفع ${file.name} (${i+1}/${files.length})`;
                
                await new Promise(r => setTimeout(r, 200));
                
                // تحويل الملف إلى Base64
                const reader = new FileReader();
                const base64 = await new Promise((resolve) => {
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
                
                videos.push({
                    id: Date.now() + i,
                    name: file.name,
                    size: file.size,
                    date: new Date().toLocaleDateString('ar-EG').replace(/\//g, '-'),
                    url: base64,
                    uploadedBy: currentUser?.email || 'unknown'
                });
            }
            
            progressFill.style.width = '100%';
            progressPercent.textContent = '100%';
            progressDetails.textContent = '✅ تم الرفع بنجاح!';
            
            saveData();
            
            setTimeout(() => {
                progress.style.display = 'none';
            }, 1500);
        }

        // ===== أحداث =====
        document.getElementById('showUploadBtn')?.addEventListener('click', () => {
            document.querySelector('.buttons-header').style.display = 'none';
            document.getElementById('buttonsGrid').style.display = 'none';
            document.getElementById('uploadPage').classList.add('active');
        });

        document.getElementById('backBtn')?.addEventListener('click', () => {
            document.querySelector('.buttons-header').style.display = 'flex';
            document.getElementById('buttonsGrid').style.display = 'grid';
            document.getElementById('uploadPage').classList.remove('active');
            resetUploadForm();
        });

        document.getElementById('closeVideosPage')?.addEventListener('click', () => {
            document.querySelector('.buttons-header').style.display = 'flex';
            document.getElementById('buttonsGrid').style.display = 'grid';
            document.getElementById('videosPage').classList.remove('active');
        });

        document.getElementById('fileInput')?.addEventListener('change', function(e) {
            const files = Array.from(this.files);
            selectedFiles = files;
            
            document.getElementById('counter').textContent = files.length + ' مقطع';
            document.getElementById('uploadBtn').disabled = files.length === 0;
            
            const filesList = document.getElementById('filesList');
            filesList.innerHTML = '';
            
            files.forEach((file, i) => {
                filesList.innerHTML += `
                    <div class="file-item">
                        <span>${i+1}. ${file.name}</span>
                        <span class="size">${(file.size/1024/1024).toFixed(2)} MB</span>
                    </div>
                `;
            });
        });

        document.getElementById('uploadBtn')?.addEventListener('click', async function() {
            if (selectedFiles.length === 0) return;
            
            this.disabled = true;
            await uploadFiles(selectedFiles);
            
            document.querySelector('.buttons-header').style.display = 'flex';
            document.getElementById('buttonsGrid').style.display = 'grid';
            document.getElementById('uploadPage').classList.remove('active');
            resetUploadForm();
        });

        function resetUploadForm() {
            document.getElementById('fileInput').value = '';
            document.getElementById('counter').textContent = '0 مقطع';
            document.getElementById('filesList').innerHTML = '';
            document.getElementById('uploadBtn').disabled = true;
            selectedFiles = [];
        }

        // ===== أحداث تسجيل الدخول =====
        document.getElementById('devBadge')?.addEventListener('click', () => {
            document.getElementById('loginModal').classList.add('active');
        });

        document.getElementById('loginSubmit')?.addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (users[email] && users[email].password === password) {
                currentUser = users[email];
                localStorage.setItem('hasryat_current_user', JSON.stringify({ email }));
                updateUI();
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                alert('✅ تم تسجيل الدخول بنجاح');
            } else {
                alert('❌ خطأ في البريد أو كلمة المرور');
            }
        });

        document.getElementById('cancelLogin')?.addEventListener('click', () => {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        });

        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            document.getElementById('exitModal').classList.add('active');
        });

        document.getElementById('confirmExit')?.addEventListener('click', () => {
            localStorage.removeItem('hasryat_current_user');
            currentUser = null;
            updateUI();
            document.getElementById('exitModal').classList.remove('active');
        });

        document.getElementById('cancelExit')?.addEventListener('click', () => {
            document.getElementById('exitModal').classList.remove('active');
        });

        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('exitModal')) {
                document.getElementById('exitModal').classList.remove('active');
            }
            if (e.target === document.getElementById('loginModal')) {
                document.getElementById('loginModal').classList.remove('active');
            }
        });

        // ===== بدء التشغيل =====
        loadData();
        checkLogin();
    </script>
</body>
</html>
